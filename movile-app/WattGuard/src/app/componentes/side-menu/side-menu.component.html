<ion-menu  contentId="main-content">
  <ion-header class="header-principal">
    <ion-toolbar>
      <ion-title>
        <h1>Configuraciones</h1>
        <p>Personalización</p>
      </ion-title>
      <ion-menu-toggle slot="end">
        <ion-button fill="outline">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </ion-button>
      </ion-menu-toggle>

    </ion-toolbar>
  </ion-header>
  <ion-content  class="ion-padding">
    <ion-title>Conexion</ion-title>
    <div>
    <ion-card class="menu-card">
      <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-title>WiFi</ion-title>
          </ion-col>
          <ion-col size="1">
            <ion-button fill="outline">
              <ion-icon name="chevron-forward-outline"></ion-icon>
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card>
    <ion-card class="menu-card">
      <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-title>Modo Internet</ion-title>
          </ion-col>
          <ion-col size="1">
            <ion-toggle [checked]="true"></ion-toggle>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card>
    </div>
    <ion-title>Notificaciones</ion-title>
    <div>
    <ion-card class="menu-card">
      <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-title>Alertas de consumo</ion-title>                    
          </ion-col>
          <ion-col size="1">
            <ion-toggle [checked]="true"></ion-toggle>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card>
    <ion-card class="menu-card">
      <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-title>Notificaciones Push</ion-title>                    
          </ion-col>
          <ion-col size="1">
            <ion-toggle [checked]="true"></ion-toggle>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card>
    </div>
    <ion-title>Seguridad</ion-title>
    <div>
    <ion-card class="menu-card">
      <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-title>cambiar contraseña</ion-title>                    
          </ion-col>  
          <ion-col size="1">
            <ion-button fill="outline">
              <ion-icon name="chevron-forward-outline"></ion-icon>
            </ion-button>               
          </ion-col>
        </ion-row>
      </ion-grid>

      <!---
            <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-title>WiFi</ion-title>
          </ion-col>
          <ion-col size="1">
              <ion-button>
              <ion-icon slot="icon-only" ios="logo-apple" md="chevron-forward-circle-outline"></ion-icon>
              </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
      -->
    </ion-card>
    </div>
  </ion-content>
</ion-menu>
