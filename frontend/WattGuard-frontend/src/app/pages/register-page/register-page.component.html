<div class="min-h-screen bg-gray-950 flex items-center justify-center">
  <div class="bg-slate-800 p-8 rounded-xl shadow-lg w-full max-w-lg">
    <div class="text-center mb-6">
      <img src="WattGuard_v2_final.svg" alt="WattGuard Logo" class="h-20 mx-auto mb-4">
      <h2 class="text-white text-3xl font-bold">Crear cuenta</h2>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="usuario" class="block text-white text-sm font-bold mb-2">Usuario</label>
        <input
          type="text"
          id="usuario"
          formControlName="usuario"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-white leading-tight focus:outline-none focus:shadow-outline"
          placeholder="Ingresa tu usuario">
      </div>

      <div class="mb-4">
        <label for="correo" class="block text-white text-sm font-bold mb-2">Correo</label>
        <input
          type="email"
          id="correo"
          formControlName="correo"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-white leading-tight focus:outline-none focus:shadow-outline"
          placeholder="Ingresa tu correo">
      </div>

      <div class="mb-4">
        <label for="password" class="block text-white text-sm font-bold mb-2">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-white leading-tight focus:outline-none focus:shadow-outline"
          placeholder="Ingresa tu contraseña">
      </div>

      <div *ngIf="errorMessage" class="mb-4 text-red-500 text-lg">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="mb-4 text-white text-lg">
        {{ successMessage }}
      </div>

      <div class="flex items-center justify-between">
        <button
          type="submit"
          [disabled]="!registerForm.valid"
          class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
          Registrarse
        </button>
      </div>
    </form>
  </div>
</div>
