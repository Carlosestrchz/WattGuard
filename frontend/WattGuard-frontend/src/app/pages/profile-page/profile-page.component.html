<div class="min-h-50 bg-gray-950 flex justify-center pt-25">
  <div class="bg-slate-800 p-8 rounded-xl shadow-lg w-full max-w-lg">
    <div class="text-center mb-6">
      <h2 class="text-white text-3xl font-bold">Perfil de usuario</h2>
      <p class="text-slate-400 mt-2">Actualiza tu correo y contraseña.</p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="usuario" class="block text-white text-sm font-bold mb-2">Usuario</label>
        <input
          type="text"
          id="usuario"
          formControlName="usuario"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-white bg-slate-700 leading-tight focus:outline-none focus:shadow-outline"
          [disabled]="true">
      </div>

      <div class="mb-4">
        <label for="correo" class="block text-white text-sm font-bold mb-2">Correo</label>
        <input
          type="email"
          id="correo"
          formControlName="correo"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-white leading-tight focus:outline-none focus:shadow-outline"
          placeholder="Ingresa tu correo">
      </div>

      <div class="mb-4">
        <label for="password" class="block text-white text-sm font-bold mb-2">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-white leading-tight focus:outline-none focus:shadow-outline"
          placeholder="Ingresa tu contraseña">
      </div>

      <div *ngIf="errorMessage" class="mb-4 text-red-500 text-sm">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="mb-4 text-green-400 text-sm">
        {{ successMessage }}
      </div>

      <button
        type="submit"
        [disabled]="!profileForm.valid"
        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline">
        Guardar cambios
      </button>
    </form>
  </div>
</div>
